<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NemoClaw Desktop</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0a0d0a;
        color: #e4e4e7;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-bottom: 1px solid #1d261f;
      }
      h1 { font-size: 18px; margin: 0; }
      .accent { color: #76b900; }
      main { padding: 24px; max-width: 860px; margin: 0 auto; }
      .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
      button {
        font: inherit;
        border-radius: 6px;
        padding: 8px 14px;
        border: 1px solid #283328;
        background: transparent;
        color: #e4e4e7;
        cursor: pointer;
      }
      button.primary { background: #76b900; color: #000; border-color: #76b900; }
      button:hover { border-color: #76b900; }
      .env {
        border: 1px solid #1d261f;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
        background: #0e1310;
      }
      .env-head { display: flex; justify-content: space-between; align-items: center; }
      .env-name { font-weight: 600; }
      .env-dir { font-size: 12px; color: #71717a; font-family: ui-monospace, monospace; margin-top: 4px; }
      .actions { display: flex; gap: 8px; align-items: center; }
      label.switch { display: inline-flex; gap: 6px; align-items: center; font-size: 13px; color: #a1a1aa; }
      #status { font-size: 12px; color: #71717a; white-space: pre-wrap; margin-top: 8px; }
      .empty { color: #71717a; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>NemoClaw <span class="accent">Desktop</span></h1>
      <label class="switch">
        <input type="checkbox" id="openAtLogin" />
        Launch at boot
      </label>
    </header>
    <main>
      <div class="toolbar">
        <button class="primary" id="add">Add environment bundle…</button>
        <button id="refresh">Refresh</button>
      </div>
      <div id="list"></div>
      <div id="status"></div>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
